{% extends "base.html" %}

{% block title %}
Login | AI Traffic Management System
{% endblock %}

{% block content %}

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow-lg">
                <div class="card-body">
                    <div class="text-center mb-4">
                        <i class="fas fa-traffic-light fa-4x text-primary"></i>
                        <h2 class="mt-3">
                            AI Traffic Management System
                        </h2>
                        <p class="text-muted">
                            Login to continue
                        </p>
                    </div>

                    <form id="loginForm">
                        <div class="mb-3">
                            <label class="form-label">Username</label>
                            <div class="input-group">
                                <span class="input-group-text">
                                    <i class="fas fa-user"></i>
                                </span>
                                <input
                                    type="text"
                                    class="form-control"
                                    id="username"
                                    placeholder="Enter Username"
                                    required>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Password</label>
                            <div class="input-group">
                                <span class="input-group-text">
                                    <i class="fas fa-lock"></i>
                                </span>
                                <input
                                    type="password"
                                    class="form-control"
                                    id="password"
                                    placeholder="Enter Password"
                                    required>
                                <button
                                    type="button"
                                    class="btn btn-outline-secondary"
                                    id="togglePassword">
                                    <i class="fas fa-eye"></i>
                                </button>
                            </div>
                        </div>

                        <div class="form-check mb-3">
                            <input
                                class="form-check-input"
                                type="checkbox"
                                id="remember">
                            <label class="form-check-label" for="remember">
                                Remember Me
                            </label>
                        </div>

                        <button type="submit" class="btn btn-primary w-100">
                            <i class="fas fa-sign-in-alt"></i> Login
                        </button>
                    </form>

                    <div id="loginMessage" class="mt-3"></div>

                    <hr>

                    <div class="text-center">
                        Don't have an account?
                        <a href="/register">Register</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

{% endblock %}

{% block javascript %}
<script>
    const togglePassword = document.getElementById("togglePassword");
    const passwordInput = document.getElementById("password");

    togglePassword.addEventListener("click", function () {
        if (passwordInput.type === "password") {
            passwordInput.type = "text";
            togglePassword.innerHTML = '<i class="fas fa-eye-slash"></i>';
        } else {
            passwordInput.type = "password";
            togglePassword.innerHTML = '<i class="fas fa-eye"></i>';
        }
    });

    document.getElementById("loginForm").addEventListener("submit", async function (e) {
        e.preventDefault();

        const username = document.getElementById("username").value.trim();
        const password = document.getElementById("password").value;
        const message = document.getElementById("loginMessage");

        message.innerHTML = "";

        const formData = new URLSearchParams();
        formData.append("username", username);
        formData.append("password", password);

        try {
            const response = await fetch("/auth/login", {
                method: "POST",
                headers: {
                    "Content-Type": "application/x-www-form-urlencoded"
                },
                body: formData
            });

            const data = await response.json();

            if (response.ok) {
                // Store token with BOTH keys for compatibility
                localStorage.setItem("access_token", data.access_token);
                localStorage.setItem("token", data.access_token);
                localStorage.setItem("username", username);
                
                if (data.user) {
                    localStorage.setItem("user", JSON.stringify(data.user));
                }

                message.innerHTML = '<div class="alert alert-success">Login Successful</div>';

                setTimeout(function () {
                    window.location.href = "/dashboard-page";
                }, 800);
            } else {
                message.innerHTML = `<div class="alert alert-danger">${data.detail || "Login failed"}</div>`;
            }
        } catch (error) {
            message.innerHTML = '<div class="alert alert-danger">Unable to connect to server.</div>';
            console.error("Login error:", error);
        }
    });
</script>
{% endblock %}
