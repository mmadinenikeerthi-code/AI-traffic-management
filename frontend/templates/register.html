{% extends "base.html" %}

{% block title %}
Register | AI Traffic Management System
{% endblock %}

{% block content %}

<div class="login-container">
    <div class="login-card" style="width: 500px; max-width: 95%;">
        <div class="text-center mb-4">
            <i class="fas fa-user-plus fa-4x text-success"></i>
            <h2 class="mt-3">Create Account</h2>
            <p class="text-muted">Traffic Management System Registration</p>
        </div>

        <form id="registerForm">
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Full Name</label>
                    <input type="text" class="form-control" id="full_name" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Username</label>
                    <input type="text" class="form-control" id="username" required>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" class="form-control" id="email" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Phone Number</label>
                <input type="tel" class="form-control" id="phone">
            </div>

          <div class="mb-3">
    <label class="form-label">Address</label>
    <textarea class="form-control" id="address" rows="2"></textarea>
</div>  

           <div class="mb-3">
    <label class="form-label">Role</label>
    <select class="form-select" id="role" required>
        <option value="">Select Role</option>
        <option value="Admin">Admin</option>
        <option value="Supervisor">Supervisor</option>
        <option value="Traffic Officer">Traffic Officer</option>
    </select>
</div> 

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Password</label>
                    <input type="password" class="form-control" id="password" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Confirm Password</label>
                    <input type="password" class="form-control" id="confirm_password" required>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">Profile Image</label>
                <input type="file" class="form-control" id="profile_image">
            </div>

            <button class="btn btn-success w-100" type="submit">
                <i class="fas fa-user-plus"></i> Register
            </button>
        </form>

        <hr>

        <div class="text-center">
            Already have an account? <a href="/login">Login</a>
        </div>

        <div id="message" class="mt-3"></div>
    </div>
</div>

{% endblock %}


{% block javascript %}
<script>
document.getElementById("registerForm").addEventListener("submit", async function (e) {
    e.preventDefault();

    const message = document.getElementById("message");

    const fullname = document.getElementById("full_name").value.trim();
    const username = document.getElementById("username").value.trim();
    const email = document.getElementById("email").value.trim();
    const phone = document.getElementById("phone").value.trim();
    const role = document.getElementById("role").value;
    const password = document.getElementById("password").value;
    const confirm_password = document.getElementById("confirm_password").value;

    message.innerHTML = "";

    if (password !== confirm_password) {
        message.innerHTML =
            '<div class="alert alert-danger">Passwords do not match.</div>';
        return;
    }

    try {

        const response = await fetch("/auth/register", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                fullname: fullname,
                username: username,
                email: email,
                phone: phone,
                role: role,
                password: password,
                confirm_password: confirm_password
            })
        });

        const data = await response.json();

        if (response.ok) {

            message.innerHTML =
                '<div class="alert alert-success">Registration Successful!</div>';

            setTimeout(() => {
                window.location.href = "/login";
            }, 1500);

        } else {

            message.innerHTML =
                `<div class="alert alert-danger">${JSON.stringify(data.detail)}</div>`;

        }

    } catch (error) {

        console.error(error);

        message.innerHTML =
            '<div class="alert alert-danger">Unable to connect to server.</div>';

    }
});
</script>
{% endblock %}
